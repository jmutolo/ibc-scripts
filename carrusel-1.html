<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
  <style>
    body {
        margin: 0;
    }

    .carrousel-item {
      width: 100%;
        height: 200px;
        border-radius: 10px;
        overflow: hidden;
    }

    .tutorial-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: black;
      padding-top: 75px;
      padding-bottom: 75px;
    }

    .tutorial-container {
      display: flex;
      flex-direction: column;
      gap: 80px;
      justify-content: center;
      align-items: center;
    }

    .tutorial-header {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .tutorial-title {
      font-family: "Special Gothic Expanded One", sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 45px;
      line-height: 110%;
      color: white;
    }

    .tutorial-carrousel-wrapper {
      width: 100%;
      max-width: 1280px;
      background-color: white;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 103px 46px 75px 46px;
      gap: 80px;
      position: relative;
    }

    .tutorial-carrousel-container {
      position: relative;
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 32px;
      overflow: hidden;
    }

    #tutorial-carrousel {
      width: 1100px;
      max-width: 1100px;
      overflow: hidden;
    }

    #tutorial-carrousel .splide__track {
      overflow: hidden;
    }

    .side-arrow.right {
      transform: rotate(180deg);
    }

    .view-all-button {
      width: fit-content;
      height: 67px;
      background: linear-gradient(189.67deg, rgba(72, 74, 87, 0.6) 28.65%, rgba(15, 15, 17, 0.6) 81.82%), #252528;
      border: 1.39583px solid #484A57;
      border-radius: 51px;
      padding-left: 22px;
      padding-right: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Special Gothic Expanded One", sans-serif;
      color: white;
    }

  </style>
  <link href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css" rel="stylesheet">
</head>
<body>
    <div class="tutorial-wrapper">
      <div class="tutorial-container">
        <div class="tutorial-header">
          <h2 class="tutorial-title">Capacitate en línea con nuestros tutoriales</h2>
          <svg></svg>
        </div>
        <div class="tutorial-carrousel-wrapper">
          <div class="tutorial-carrousel-container">
            <div class="side-arrow left">
              <svg width="21" height="40" viewBox="0 0 21 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19.9375 0.914062L0.912694 19.9389L19.9375 38.9637" stroke="black" stroke-width="1.82755" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <section id="tutorial-carrousel" class="splide" aria-label="Tutorial Carrousel">
                <div class="splide__track">
                    <ul class="splide__list">
                    </ul>
                </div>
            </section>
            <div class="side-arrow right">
              <svg width="21" height="40" viewBox="0 0 21 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19.9375 0.914062L0.912694 19.9389L19.9375 38.9637" stroke="black" stroke-width="1.82755" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <a class="view-all-button">
            ver todos
          </a>
          <div class="absolute-svg-drawing" style="position: absolute; pointer-events: none;">
              <svg></svg>
          </div>
        </div>
      </div>
    </div>



  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
  <script type="text/javascript">
    function renderCarousel(data) {
      const carousel = document.querySelector('#tutorial-carrousel .splide__list');
      if (!carousel) return;

      const items = Array.isArray(data) ? data : [];
      if (!items.length) return;

      carousel.innerHTML = '';

      for (const item of items) {
        const listItem = document.createElement('li');
        listItem.classList.add('splide__slide');
        listItem.innerHTML = `
          <div class="carrousel-item">
            <img src="${item?.miniatura || item?.portada || ''}" alt="${item?.title || ''}" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
        `;
        carousel.appendChild(listItem);
      }

      if (typeof Splide !== 'undefined') {
        const splide = new Splide('#tutorial-carrousel', {
          type: 'loop',
          perPage: 3,
          perMove: 1,
          autoplay: false,
          pagination: false,
          arrows: false,
          autoWidth: false,
          gap: '16px',
        });
        splide.mount();
        /*arrows*/
        const leftArrow = document.querySelector('.side-arrow.left');
        const rightArrow = document.querySelector('.side-arrow.right');
        if (leftArrow && rightArrow) {
          leftArrow.addEventListener('click', () => splide.go('<'));
          rightArrow.addEventListener('click', () => splide.go('>'));
        }
      } else {
        console.error('Splide is not available in iframe');
      }
    }

    window.addEventListener('message', (event) => {
      if (!event.data) return;
      console.log('Data received in iFrame:', event.data);

      let payload = event.data;
      if (typeof payload === 'string') {
        try {
          payload = JSON.parse(payload);
        } catch (_) {
          payload = [];
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => renderCarousel(payload), { once: true });
      } else {
        renderCarousel(payload);
      }
    });
  </script>
</body>
</html>
