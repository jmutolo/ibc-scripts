<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
  <style>
    body {
        margin: 0;
        overflow: hidden;
    }

    .carrousel-item {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .carrousel-item img {
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .carrousel-item:hover img {
      transform: scale(1.05);
      filter: brightness(1.2);
    }

    .tutorial-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: black;
      padding-top: 75px;
      padding-bottom: 75px;
    }

    .tutorial-container {
      display: flex;
      flex-direction: column;
      gap: 80px;
      justify-content: center;
      align-items: center;
    }

    .tutorial-header {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .tutorial-title {
      font-family: "Special Gothic Expanded One", sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 45px;
      line-height: 110%;
      color: white;
      text-align: center;
      user-select: none;
    }

    .tutorial-carrousel-wrapper {
      width: 100%;
      max-width: 1280px;
      background-color: white;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 75px 46px 75px 46px;
      gap: 46px;
      position: relative;
      overflow: hidden;
    }

    .tutorial-carrousel-container {
      position: relative;
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 32px;
      overflow: hidden;
    }

    #tutorial-carrousel {
      width: 1100px;
      max-width: 1100px;
      overflow: hidden;
    }

    #tutorial-carrousel .splide__track {
      overflow: hidden;
    }

    .side-arrow {
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .side-arrow:hover {
      opacity: 0.7;
    }

    .side-arrow.right {
      transform: rotate(180deg);
    }

    .view-all-button {
      width: fit-content;
      height: 67px;
      background: linear-gradient(189.67deg, rgba(72, 74, 87, 0.6) 28.65%, rgba(15, 15, 17, 0.6) 81.82%), #252528;
      border: 1.39583px solid #484A57;
      border-radius: 51px;
      padding-left: 45px;
      padding-right: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Special Gothic Expanded One", sans-serif;
      color: white;
      transition: opacity 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      user-select: none;
    }

    .view-all-button:hover {
      opacity: 0.7;
    }

    .absolute-svg-drawing {
        position: absolute;
        pointer-events: none;
        left: -100px;
        bottom: -100px;
        transform: rotate(45deg);
    }

    .video-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      z-index: 9999;
      padding: 24px;
      box-sizing: border-box;
    }

    .video-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .video-modal-card {
      position: relative;
      width: min(960px, 92vw);
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      background: black;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      transform: scale(0.98);
      opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .video-modal.is-ready .video-modal-card {
      transform: scale(1);
      opacity: 1;
    }

    .video-modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 0;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .video-modal-player {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    .video-modal-ghost {
      position: fixed;
      margin: 0;
      z-index: 10000;
      pointer-events: none;
      overflow: hidden;
      transform-origin: center center;
      transition: all 0.34s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .video-modal-ghost img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    body.modal-open {
      overflow: hidden;
    }

    @media (max-width: 1279px) and (min-width: 479px) {
      .tutorial-wrapper {
        padding-top: 56px;
        padding-bottom: 56px;
      }

      .tutorial-container {
        gap: 48px;
      }

      .tutorial-title {
        font-size: 34px;
      }

      .tutorial-carrousel-wrapper {
        padding: 56px 24px;
        gap: 32px;
      }

      .tutorial-carrousel-container {
        gap: 20px;
      }

      #tutorial-carrousel {
        width: 728px;
        max-width: 728px;
      }
    }

    @media (max-width: 478px) {
      .tutorial-wrapper {
        padding-top: 40px;
        padding-bottom: 40px;
      }

      .tutorial-container {
        gap: 32px;
      }

      .tutorial-title {
        font-size: 26px;
      }

      .tutorial-carrousel-wrapper {
        border-radius: 14px;
        padding: 36px 14px;
        gap: 24px;
      }

      .tutorial-carrousel-container {
        gap: 12px;
      }

      #tutorial-carrousel {
        width: calc(100vw - 88px);
        max-width: calc(100vw - 88px);
      }

      .carrousel-item {
        height: 180px;
      }

      .side-arrow svg {
        width: 16px;
        height: 30px;
      }

      .view-all-button {
        height: 54px;
        padding-left: 24px;
        padding-right: 24px;
        font-size: 14px;
      }
    }

  </style>

          </div>
        </div>
      </div>
    </div>

    <div id="video-modal" class="video-modal" aria-hidden="true">
      <div class="video-modal-card" role="dialog" aria-modal="true" aria-label="Video player popup">
        <button id="video-modal-close" class="video-modal-close" aria-label="Cerrar video">&times;</button>
        <video id="video-modal-player" class="video-modal-player" controls playsinline></video>
      </div>
    </div>



  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
  <script type="text/javascript">
    let splide = null;
    let activeGhost = null;
    let modalHandlersInitialized = false;
    let carouselClickBound = false;

    function openVideoModalFromItem(itemElement, videoUrl) {
      if (!itemElement || !videoUrl) return;

      const modal = document.getElementById('video-modal');
      const modalCard = modal?.querySelector('.video-modal-card');
      const videoPlayer = document.getElementById('video-modal-player');
      if (!modal || !modalCard || !videoPlayer) return;

      const sourceImage = itemElement.querySelector('img');
      modal.classList.add('is-open');
      modal.classList.remove('is-ready');
      modal.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');

      const startRect = itemElement.getBoundingClientRect();
      const endRect = modalCard.getBoundingClientRect();

      if (activeGhost) {
        activeGhost.remove();
        activeGhost = null;
      }

      if (sourceImage) {
        const ghost = sourceImage.cloneNode(true);
        ghost.classList.add('video-modal-ghost');
        ghost.style.left = `${startRect.left}px`;
        ghost.style.top = `${startRect.top}px`;
        ghost.style.width = `${startRect.width}px`;
        ghost.style.height = `${startRect.height}px`;
        ghost.style.borderRadius = '10px';
        document.body.appendChild(ghost);
        activeGhost = ghost;

        requestAnimationFrame(() => {
          ghost.style.left = `${endRect.left}px`;
          ghost.style.top = `${endRect.top}px`;
          ghost.style.width = `${endRect.width}px`;
          ghost.style.height = `${endRect.height}px`;
          ghost.style.borderRadius = '16px';
        });

        ghost.addEventListener('transitionend', () => {
          modal.classList.add('is-ready');
          videoPlayer.src = videoUrl;
          videoPlayer.play().catch(() => {});
          ghost.remove();
          if (activeGhost === ghost) activeGhost = null;
        }, { once: true });
      } else {
        modal.classList.add('is-ready');
        videoPlayer.src = videoUrl;
        videoPlayer.play().catch(() => {});
      }
    }

    function closeVideoModal() {
      const modal = document.getElementById('video-modal');
      const videoPlayer = document.getElementById('video-modal-player');
      if (!modal || !videoPlayer) return;

      modal.classList.remove('is-open', 'is-ready');
      modal.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');

      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.load();

      if (activeGhost) {
        activeGhost.remove();
        activeGhost = null;
      }
    }

    function setupModalHandlers() {
      const modal = document.getElementById('video-modal');
      const closeButton = document.getElementById('video-modal-close');
      if (!modal || !closeButton || modalHandlersInitialized) return;

      closeButton.addEventListener('click', closeVideoModal);
      modal.addEventListener('click', (event) => {
        if (event.target === modal) closeVideoModal();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeVideoModal();
      });

      modalHandlersInitialized = true;
    }

    function renderCarousel(data) {
      const carousel = document.querySelector('#tutorial-carrousel .splide__list');
      if (!carousel) return;

      const items = Array.isArray(data) ? data : [];
      if (!items.length) return;

      carousel.innerHTML = '';

      for (const item of items) {
        const listItem = document.createElement('li');
        listItem.classList.add('splide__slide');

        const card = document.createElement('div');
        card.classList.add('carrousel-item');
        card.dataset.videoUrl = item?.r2MediaUrl || '';

        const image = document.createElement('img');
        image.src = item?.miniatura || item?.portada || '';
        image.alt = item?.title || '';
        image.style.width = '100%';
        image.style.height = '100%';
        image.style.objectFit = 'cover';

        card.appendChild(image);
        listItem.appendChild(card);
        carousel.appendChild(listItem);
      }

      if (typeof Splide !== 'undefined') {
        if (splide) {
          splide.destroy(true);
        }

        splide = new Splide('#tutorial-carrousel', {
          type: 'slide',
          perPage: 3,
          perMove: 1,
          autoplay: false,
          pagination: false,
          arrows: false,
          autoWidth: false,
          gap: '16px',
          breakpoints: {
            1279: {
              perPage: 2,
              perMove: 1,
            },
            900: {
              perPage: 1,
              perMove: 1,
            },
          },
        });
        splide.mount();

        if (!carouselClickBound) {
          carousel.addEventListener('click', (event) => {
            const card = event.target.closest('.carrousel-item');
            if (!card) return;

            const videoUrl = card.dataset.videoUrl;
            if (!videoUrl) return;

            openVideoModalFromItem(card, videoUrl);
          });

          carouselClickBound = true;
        }

        /*arrows*/
        const leftArrow = document.querySelector('.side-arrow.left');
        const rightArrow = document.querySelector('.side-arrow.right');
        if (leftArrow && rightArrow) {
          leftArrow.addEventListener('click', () => splide.go('<'));
          rightArrow.addEventListener('click', () => splide.go('>'));
        }
      } else {
        console.error('Splide is not available in iframe');
      }
    }

    window.addEventListener('message', (event) => {
      if (!event.data) return;
      console.log('Data received in iFrame:', event.data);

      let payload = event.data;
      if (typeof payload === 'string') {
        try {
          payload = JSON.parse(payload);
        } catch (_) {
          payload = [];
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          setupModalHandlers();
          renderCarousel(payload);
        }, { once: true });
      } else {
        setupModalHandlers();
        renderCarousel(payload);
      }
    });
  </script>
</body>
