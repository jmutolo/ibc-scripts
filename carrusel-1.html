<!DOCTYPE html>
<html>
<head>
  <style>
    body {
        margin: 0;
    }

    .carrousel-item {
        width: 455px;
        height: 256px;
        border-radius: 10px;
        overflow: hidden;
    }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css" rel="stylesheet">
</head>
<body>

    <section id="tutorial-carrousel" class="splide" aria-label="Tutorial Carrousel">
        <div class="splide__track">
            <ul class="splide__list">
            </ul>
        </div>
    </section>


  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
  <script type="text/javascript">
    function renderCarousel(data) {
      const carousel = document.querySelector('#tutorial-carrousel .splide__list');
      if (!carousel) return;

      const items = Array.isArray(data) ? data : [];
      if (!items.length) return;

      carousel.innerHTML = '';

      for (const item of items) {
        const listItem = document.createElement('li');
        listItem.classList.add('splide__slide');
        listItem.innerHTML = `
          <div class="carrousel-item">
            <img src="${item?.miniatura || item?.portada || ''}" alt="${item?.title || ''}" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
        `;
        carousel.appendChild(listItem);
      }

      if (typeof Splide !== 'undefined') {
        const splide = new Splide('#tutorial-carrousel', {
          type: 'loop',
          perPage: 3,
          autoplay: true,
        });
        splide.mount();
      } else {
        console.error('Splide is not available in iframe');
      }
    }

    window.addEventListener('message', (event) => {
      if (!event.data) return;
      console.log('Data received in iFrame:', event.data);

      let payload = event.data;
      if (typeof payload === 'string') {
        try {
          payload = JSON.parse(payload);
        } catch (_) {
          payload = [];
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => renderCarousel(payload), { once: true });
      } else {
        renderCarousel(payload);
      }
    });
  </script>
</body>
</html>
